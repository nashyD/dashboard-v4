<style>
:root {
  --bg: #08080c;
  --surface: rgba(255,255,255,0.025);
  --surface-border: rgba(255,255,255,0.07);
  --text: #e8e8ec;
  --text-dim: rgba(255,255,255,0.4);
  --text-muted: rgba(255,255,255,0.2);
  --text-ghost: rgba(255,255,255,0.08);
  --red: #ff2d55; --purple: #bf5af2; --teal: #30d5c8;
  --green: #32d74b; --yellow: #ffd60a; --blue: #6e6eff;
  --red-glow: rgba(255,45,85,0.25); --purple-glow: rgba(191,90,242,0.25); --teal-glow: rgba(48,213,200,0.25);
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;overscroll-behavior:none;}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes toastUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fabGlow{0%,100%{box-shadow:0 4px 20px var(--red-glow)}50%{box-shadow:0 4px 32px rgba(255,45,85,.45),0 0 0 8px rgba(255,45,85,.06)}}
.fade-in{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
input:focus,textarea:focus{outline:none;border-color:rgba(255,45,85,.35)!important}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.15)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.06);cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;border:none;cursor:pointer}
#particles{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.glass{background:var(--surface);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);border:1px solid var(--surface-border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.4,0,.2,1)}
.glass::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.glass.hoverable:active{transform:scale(.985)}
.mono{font-family:'IBM Plex Mono',monospace}
.label{font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.label-sm{font-size:8px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.nav{display:flex;gap:3px;padding:3px;background:rgba(255,255,255,.025);border-radius:14px;border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(20px)}
.nav-btn{flex:1;padding:8px 4px;background:transparent;border:none;border-radius:11px;color:rgba(255,255,255,.25);font-size:10px;font-weight:500;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{background:rgba(255,45,85,.12);color:var(--red);font-weight:700;border:1px solid rgba(255,45,85,.15)}
.nav-btn .icon{font-size:15px}
.fab{position:fixed;bottom:calc(80px + var(--safe-bottom));right:20px;z-index:100;width:52px;height:52px;border-radius:16px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--red),#bf3050);color:#fff;font-size:26px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--red-glow);transition:all .3s;animation:fabGlow 3s ease-in-out infinite}
.fab:active{transform:scale(.92)}
.sub-tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.04);margin-bottom:14px}
.sub-tab{flex:1;padding:7px 10px;background:transparent;border:none;border-radius:7px;color:rgba(255,255,255,.3);font-size:10px;font-weight:600;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;transition:all .2s}
.sub-tab.active{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.08)}
.pill{padding:6px 14px;white-space:nowrap;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;transition:all .3s;background:transparent;border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.25)}
.pill.active{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);color:#fff}
.check-circle{width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:transparent;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.check-circle.taken{color:inherit}
.input{width:100%;padding:11px 14px;background:rgba(255,255,255,.03);border:1px solid var(--surface-border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;transition:border-color .3s}
textarea.input{resize:none;min-height:80px;line-height:1.6}
.btn-primary{padding:14px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--red),#bf3050);color:#fff;box-shadow:0 4px 16px var(--red-glow);transition:all .2s}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{padding:14px 20px;border-radius:12px;border:1px solid var(--surface-border);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .2s}

.chat-msg{max-width:88%;padding:12px 16px;font-size:13px;line-height:1.65;animation:fadeUp .25s ease both}
.chat-user{border-radius:16px 16px 4px 16px;background:linear-gradient(135deg,var(--red),#bf3050);color:#fff;box-shadow:0 4px 16px var(--red-glow);margin-left:auto}

.stream-cursor{animation:blink .8s step-end infinite;color:var(--red);font-weight:700}
.toggle{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;border:none;transition:background .3s}
.thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .3s}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);animation:fadeIn .2s ease;padding-bottom:var(--safe-bottom)}
.sheet{width:100%;max-width:480px;max-height:92vh;overflow-y:auto;background:#0d0d12;border-radius:24px 24px 0 0;padding:28px 24px 32px;border:1px solid rgba(255,255,255,.08);border-bottom:none;animation:fadeUp .3s cubic-bezier(.4,0,.2,1)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);margin:0 auto 24px}
#toasts{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none;align-items:center;width:max-content;max-width:calc(100vw - 40px)}
.toast{padding:10px 20px;border-radius:12px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;pointer-events:auto;cursor:pointer;backdrop-filter:blur(20px);border:1px solid;white-space:nowrap;transition:opacity .3s,transform .3s;animation:toastUp .3s ease}
.toast-success{background:rgba(50,215,75,.15);border-color:rgba(50,215,75,.3);color:#32d74b}
.toast-error{background:rgba(255,45,85,.15);border-color:rgba(255,45,85,.3);color:#ff2d55}
.toast-info{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.8)}
.toast-warn{background:rgba(255,214,10,.15);border-color:rgba(255,214,10,.3);color:#ffd60a}
#pwa-banner{position:fixed;top:calc(var(--safe-top) + 8px);left:12px;right:12px;z-index:300;background:rgba(13,13,18,.95);border:1px solid rgba(255,45,85,.2);border-radius:14px;padding:14px 16px;display:none;align-items:center;gap:12px;backdrop-filter:blur(20px);animation:fadeUp .3s ease}
.sup-tag{background:rgba(255,255,255,.04);padding:2px 8px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.timeline-dot{position:absolute;left:-22px;top:8px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg)}
.spark-area{opacity:.12}
.journal-card{padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border-left:2px solid rgba(191,90,242,.3);margin-bottom:8px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.settings-row:last-child{border-bottom:none}
.insights-body h2{font-size:11px;font-weight:700;color:var(--red);margin:14px 0 5px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(255,45,85,.12);padding-bottom:4px}

.insights-body strong{color:rgba(255,255,255,.92)}
.insights-body code{background:rgba(255,255,255,.07);padding:1px 6px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal)}
</style>

// ── Particles ────────────────────────────────────────────
function initParticles(){
  const c=document.getElementById('particles');if(!c)return;
  const ctx=c.getContext('2d');let w,h;
  const mouse={x:-9999,y:-9999};
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  document.addEventListener('touchmove',e=>{mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;},{passive:true});
  const ps=Array.from({length:65},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.4,a:Math.random()*.4+.08,hue:[340,170,270][Math.floor(Math.random()*3)]}));
  function draw(){
    ctx.clearRect(0,0,w,h);
    ps.forEach(p=>{
      const dx=p.x-mouse.x,dy=p.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<130&&dist>1){const f=(130-dist)/130*.4;p.vx+=(dx/dist)*f;p.vy+=(dy/dist)*f;}
      p.vx*=.988;p.vy*=.988;
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if(spd>1.3){p.vx=p.vx/spd*1.3;p.vy=p.vy/spd*1.3;}
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},75%,65%,${p.a})`;ctx.fill();
    });
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
      const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle=`rgba(255,255,255,${.04*(1-d/100)})`;ctx.lineWidth=.5;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
}

function svgGauge(val,max,size,color,label,sub){
  const pct=max>0?val/max:0,r=(size-14)/2,circ=2*Math.PI*r,off=circ*(1-pct);
  return`<div style="text-align:center"><svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="6"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 6px ${color}88)"/></svg><div style="margin-top:${-size/2-14}px;height:${size/2+14}px;display:flex;flex-direction:column;justify-content:center;align-items:center"><div style="font-size:${size/4}px;font-weight:800;color:#fff">${val}</div>${sub?`<div class="label-sm" style="margin-top:2px">${sub}</div>`:''}</div>${label?`<div class="label-sm" style="margin-top:4px">${label}</div>`:''}</div>`;
}
function svgSparkline(data,color,w=80,h=24){
  if(!data||data.length<2)return'';
  const max=Math.max(...data,1),min=Math.min(...data,0),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*h}`).join(' ');
  const lx=(data.length-1)/(data.length-1)*w,ly=h-((data[data.length-1]-min)/range)*h;
  return`<svg width="${w}" height="${h}" style="overflow:visible"><polygon points="${pts} ${w},${h} 0,${h}" fill="${color}" class="spark-area"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 3px ${color}66)"/><circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}" style="filter:drop-shadow(0 0 5px ${color})"/></svg>`;
}

// ── Streaming SSE ────────────────────────────────────────
async function streamSSE(res,onChunk,onDone){
  const reader=res.body.getReader(),decoder=new TextDecoder();
  let buf='',text='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    buf+=decoder.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const line of lines){
      if(!line.startsWith('data: '))continue;
      const d=line.slice(6).trim();if(!d||d==='[DONE]')continue;
      try{const e=JSON.parse(d);if(e.type==='content_block_delta'&&e.delta?.type==='text_delta'){text+=e.delta.text;onChunk(text);}}catch{}
    }
  }
  onDone(text);
}

      html+=`</div><div style="display:flex;gap:12px;justify-content:center;max-width:500px;margin:0 auto"><button onclick="state.onboardStep='name';render()" style="padding:16px 28px;border-radius:14px;border:1px solid var(--surface-border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer">← Back</button><button onclick="completeOnboarding()" style="flex:1;max-width:320px;padding:16px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:${state.selectedTemplate?'pointer':'default'};background:${state.selectedTemplate?'linear-gradient(135deg,var(--red),#bf3050)':'rgba(255,255,255,.03)'};color:${state.selectedTemplate?'#fff':'rgba(255,255,255,.15)'};box-shadow:${state.selectedTemplate?'0 4px 20px var(--red-glow)':'none'};transition:all .3s">Launch Protocol →</button></div></div></div>`;

    if(state.onboardStep==="name"){const inp=document.getElementById('onboardNameInput');if(inp)setTimeout(()=>inp.focus(),100);}

  }

  // MAIN APP
  if(fab)fab.style.display='flex';
  const td=todayStr(),pct=pctToday(),taken=takenToday(),total=totalActive();
  const now=new Date();
  const timeStr=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const a7=adherence7(),avgA=Math.round(a7.reduce((a,b)=>a+b,0)/7);
  const spend=activeSupps().reduce((s,x)=>s+(x.cost||0)*30,0);

  const todayBio=state.bio[td];
  const bestStreak=Math.max(...state.supplements.filter(s=>s.active).map(s=>getStreak(s.id)),0);
  const filtered=state.supplements.filter(s=>state.filter==="All"||s.category===state.filter);
  const dayLabels=["S","M","T","W","T","F","S"];
  const windows=[
    {label:"FASTED AM",time:"6:00–8:00",items:activeSupps().filter(s=>s.fasted&&s.timing==="Morning"),color:"#bf5af2"},

    {label:"PRE-WORKOUT",time:"15:00–16:00",items:activeSupps().filter(s=>s.timing==="Pre-workout"),color:"#ff2d55"},
    {label:"POST-WORKOUT",time:"17:00–18:00",items:activeSupps().filter(s=>s.timing==="Post-workout"),color:"#ffd60a"},
    {label:"EVENING",time:"20:00–21:00",items:activeSupps().filter(s=>s.timing==="Evening"||s.timing==="As needed"),color:"#6e6eff"},

  let html='';

  // HEADER
  html+=`<div style="padding:20px 24px 0"><div class="fade-in" style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="display:flex;align-items:center;gap:10px"><div style="width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red),0 0 24px var(--red-glow);animation:pulse 2s infinite"></div><h1 style="font-size:26px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--red) 0%,var(--purple) 40%,var(--teal) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent">PROTOCOL</h1></div><p class="label" style="margin:2px 0 0 18px;letter-spacing:3px">${state.profile?.name?eH(state.profile.name.toUpperCase())+' · ':''}COMMAND CENTER</p></div><div style="text-align:right"><div id="live-clock" class="mono" style="font-size:22px;font-weight:300;color:rgba(255,255,255,.6);letter-spacing:2px">${timeStr}</div><div class="label-sm" style="margin-top:2px;letter-spacing:1.5px">${td}</div></div></div>`;

  // NAV
  const navs=[{k:"command",l:"Command",i:"◉"},{k:"stack",l:"Stack",i:"⬡"},{k:"timing",l:"Timing",i:"◷"},{k:"bio",l:"Bio",i:"♡"},{k:"chat",l:"Claude",i:"◈"}];

  // ═══ COMMAND ═══
  if(state.view==="command"){

    // Progress
    html+=`<div class="glass fade-in d2" style="padding:16px 20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="label" style="letter-spacing:2px">DAILY PROGRESS</span><span style="font-size:24px;font-weight:800;color:${pct===100?'var(--green)':'var(--red)'}">${pct}%</span></div><div style="height:4px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:2px;transition:width 1s;background:${pct===100?'linear-gradient(90deg,var(--green),#72efdd)':'linear-gradient(90deg,var(--red),var(--purple),var(--teal))'};box-shadow:${pct===100?'0 0 12px rgba(50,215,75,.5)':'0 0 12px var(--red-glow)'}"></div></div></div>`;

    // Biomarkers summary
    html+=`<div class="glass fade-in d4"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="label" style="letter-spacing:2px">BIOMARKERS</span>${!todayBio?`<button onclick="openBioModal()" style="background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.2);border-radius:8px;padding:4px 12px;color:var(--red);font-size:10px;font-family:IBM Plex Mono,monospace;cursor:pointer">LOG TODAY</button>`:`<span class="label-sm">LOGGED ✓</span>`}</div><div style="display:flex;justify-content:space-between">`;
    BIOS.forEach(b=>{const hist=bioHistory(b.key);html+=`<div style="text-align:center;flex:1"><div style="font-size:16px">${b.icon}</div><div style="margin:4px 0">${svgSparkline(hist,b.color,40,18)}</div><div style="font-size:16px;font-weight:700;color:${todayBio?b.color:'var(--text-ghost)'}">${todayBio?.[b.key]||'—'}</div><div class="label-sm" style="margin-top:2px">${b.label}</div></div>`;});

    // Stats row

  // ═══ STACK ═══
  if(state.view==="stack"){

    if(!filtered.length){html+=`<div style="text-align:center;padding:48px 20px;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px">⬡</div><p style="font-size:13px">No supplements in this category.<br>Tap + to add one.</p></div>`;}
    filtered.forEach((s,i)=>{
      const c=CAT[s.category]||CAT.Essential,taken=isTaken(s.id),streak=getStreak(s.id),compound=getCompoundInfo(s.name);
      const icon=getCompoundIcon(s.name,taken?c.accent:'rgba(255,255,255,.25)');
      html+=`<div class="fade-in d${Math.min(i+1,6)}"><div class="glass hoverable" style="padding:16px 18px;opacity:${s.active?1:.35};${taken?`border-color:${c.accent}33;background:${c.accent}08`:''}">
        ${taken?`<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${c.accent},${c.accent}88);border-radius:16px 16px 0 0"></div>`:''}

          <div style="flex-shrink:0;width:56px;height:56px;border-radius:12px;background:${taken?c.accent+'0a':'rgba(255,255,255,.02)'};border:1px solid ${taken?c.accent+'22':'rgba(255,255,255,.04)'};display:flex;align-items:center;justify-content:center;transition:all .3s">${icon}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:15px;font-weight:700;color:${taken?c.accent:'#ccc'};transition:color .3s">${eH(s.name)}</span>${streak>1?`<span style="font-size:9px;background:${c.accent}15;color:${c.accent};padding:2px 8px;border-radius:10px;font-family:IBM Plex Mono,monospace;font-weight:600;border:1px solid ${c.accent}22">${streak}d 🔥</span>`:''}</div>
            ${compound.formula!=='—'?`<div style="display:flex;gap:10px;margin-top:4px"><span class="mono" style="font-size:9px;color:${taken?c.accent+'99':'rgba(255,255,255,.2)'}">${compound.formula}</span><span class="mono" style="font-size:8px;color:rgba(255,255,255,.12)">${compound.mw}</span></div>`:''}
            <div style="font-size:11px;color:var(--text-dim);margin-top:4px;font-family:IBM Plex Mono,monospace;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="sup-tag">${eH(s.dose)}</span><span>${eH(s.timing)}</span>${s.fasted?`<span style="color:rgba(50,215,75,.5);font-size:9px">● fasting-safe</span>`:''}</div>
            ${compound.mechanism.length?`<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">${compound.mechanism.map(m=>`<span style="font-size:8px;padding:2px 7px;border-radius:8px;background:${taken?c.accent+'12':'rgba(255,255,255,.03)'};border:1px solid ${taken?c.accent+'20':'rgba(255,255,255,.04)'};color:${taken?c.accent+'bb':'rgba(255,255,255,.2)'};font-family:IBM Plex Mono,monospace">${m}</span>`).join('')}</div>`:''}
            ${s.notes?`<div style="font-size:10px;color:var(--text-muted);margin-top:4px">${eH(s.notes)}</div>`:''}
            ${s.remaining>0&&s.remaining<=10?`<div style="font-size:9px;color:var(--red);margin-top:4px;font-family:IBM Plex Mono,monospace">⚠ ${s.remaining} servings left</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0">
            <div class="check-circle ${taken?'taken':''}" onclick="${s.active?`toggleTaken('${s.id}')`:''}" style="${taken?`border-color:${c.accent};background:${c.accent}22;color:${c.accent};box-shadow:0 0 16px ${c.accent}33`:''}">${taken?'✓':''}</div>
            <button onclick="startEdit('${s.id}')" style="background:none;border:none;color:rgba(255,255,255,.12);cursor:pointer;font-size:12px;padding:2px">✎</button>
          </div>
        </div>
      </div></div>`;
    });
    html+=`</div>`;
  }

  // ═══ TIMING ═══
  if(state.view==="timing"){
    html+=`<div class="label" style="margin-bottom:12px;letter-spacing:2px">OPTIMAL DOSING WINDOWS</div>`;

    windows.forEach((w,i)=>{
      html+=`<div class="fade-in d${Math.min(i+1,6)}" style="margin-bottom:16px;position:relative"><div class="timeline-dot" style="background:${w.color};box-shadow:0 0 10px ${w.color}66"></div><div class="glass" style="padding:14px 18px;margin-left:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="mono" style="font-size:11px;font-weight:700;color:${w.color};letter-spacing:1.5px">${w.label}</span><span class="mono" style="font-size:10px;color:var(--text-muted)">${w.time}</span></div>`;

      });
      html+=`</div></div>`;
    });
    html+=`</div>`;
    if(!windows.length){html+=`<div style="text-align:center;padding:48px 20px;color:var(--text-muted)"><div style="font-size:36px;margin-bottom:12px">◷</div><p style="font-size:13px">No timing data yet.<br>Add supplements with timing to see windows.</p></div>`;}
    html+=`<div class="glass fade-in d5" style="margin-top:8px;padding:16px;border-color:rgba(191,90,242,.1)"><div class="mono" style="font-size:10px;letter-spacing:2px;color:var(--purple);margin-bottom:8px">IF PROTOCOL NOTE</div><div style="font-size:12px;color:var(--text-dim);line-height:1.6"><strong style="color:rgba(255,255,255,.6)">Fasting-safe:</strong> ${activeSupps().filter(s=>s.fasted).map(s=>eH(s.name)).join(', ')||'None'}</div><div style="font-size:12px;color:var(--text-dim);line-height:1.6;margin-top:4px"><strong style="color:rgba(255,255,255,.6)">Require food:</strong> ${activeSupps().filter(s=>!s.fasted).map(s=>eH(s.name)).join(', ')||'None'}</div></div>`;
  }

  // ═══ BIO ═══
  if(state.view==="bio"){
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="label" style="letter-spacing:2px">BIOMARKER TRACKING</div>${!todayBio?`<button onclick="openBioModal()" style="background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.2);border-radius:8px;padding:6px 14px;color:var(--red);font-size:10px;font-family:IBM Plex Mono,monospace;cursor:pointer;font-weight:600">+ LOG TODAY</button>`:''}</div>`;
    BIOS.forEach((b,i)=>{
      const hist=bioHistory(b.key),latest=todayBio?.[b.key];
      const avg=hist.filter(v=>v>0),avgVal=avg.length?(avg.reduce((a,c)=>a+c,0)/avg.length).toFixed(1):'—';
      html+=`<div class="glass fade-in d${Math.min(i+1,6)}" style="padding:16px 18px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">${b.icon}</span><div><div style="font-size:13px;font-weight:600;color:${b.color}">${b.label}</div><div class="label-sm" style="margin-top:2px">7d avg: ${avgVal}</div></div></div><div style="display:flex;align-items:center;gap:14px">${svgSparkline(hist,b.color,90,28)}<div style="font-size:28px;font-weight:800;color:${latest?b.color:'var(--text-ghost)'};min-width:28px;text-align:right">${latest||'—'}</div></div></div></div>`;
    });
    // Adherence log
    html+=`<div class="label" style="margin:20px 0 12px;letter-spacing:2px">ADHERENCE HISTORY</div>`;
    const logEntries=Object.entries(state.log).sort(([a],[b])=>b.localeCompare(a)).slice(0,10);
    logEntries.forEach(([date,entries])=>{
      const t=Object.values(entries).filter(Boolean).length,tot=totalActive(),p=tot>0?Math.round(t/tot*100):0;
      html+=`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)"><span class="mono" style="font-size:10px;color:${date===td?'var(--red)':'var(--text-muted)'};width:72px;flex-shrink:0">${date===td?'TODAY':date.slice(5)}</span><div style="flex:1;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden"><div style="height:100%;width:${p}%;background:${p===100?'var(--green)':'linear-gradient(90deg,var(--red),var(--purple))'};border-radius:2px"></div></div><span class="mono" style="font-size:11px;color:${p===100?'var(--green)':p>50?'var(--yellow)':'var(--red)'};width:32px;text-align:right;font-weight:600">${p}%</span></div>`;
    });
    // Journal
    html+=`<div class="label" style="margin:20px 0 12px;letter-spacing:2px">DAILY JOURNAL</div>`;

    }
    const journalEntries=Object.entries(state.journal).sort(([a],[b])=>b.localeCompare(a)).slice(0,5);
    journalEntries.forEach(([date,text])=>{
      html+=`<div class="journal-card fade-in"><div class="label-sm" style="color:var(--purple);margin-bottom:6px">${date===td?'TODAY':date}</div><div style="font-size:12px;color:var(--text-dim);line-height:1.6">${eH(text)}</div></div>`;
    });
  }

  // ═══ CLAUDE ═══
  if(state.view==="chat"){
    html+=`<div class="sub-tabs"><button class="sub-tab ${state.subView==='chat'?'active':''}" onclick="state.subView='chat';render()">CHAT</button><button class="sub-tab ${state.subView==='insights'?'active':''}" onclick="state.subView='insights';render()">INSIGHTS</button><button class="sub-tab ${state.subView==='analyze'?'active':''}" onclick="state.subView='analyze';render()">ANALYZE</button></div>`;

    // ── Chat sub-view ──
    if(state.subView==='chat'){
      html+=`<div style="display:flex;flex-direction:column;height:calc(100vh - 260px)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)"></div><span class="label" style="letter-spacing:2px">CLAUDE ONLINE</span></div>${state.chat.length?`<button onclick="clearChat()" style="background:none;border:1px solid var(--surface-border);border-radius:6px;color:var(--text-muted);font-size:9px;padding:3px 10px;cursor:pointer;font-family:IBM Plex Mono,monospace">CLEAR</button>`:''}</div>`;
      html+=`<div id="chatScroll" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:12px">`;
      if(!state.chat.length){
        html+=`<div style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:16px;filter:drop-shadow(0 0 20px var(--purple-glow))">◈</div><p style="color:var(--text-muted);font-size:13px;line-height:1.6;max-width:300px;margin:0 auto">Your protocol advisor. Full context on your stack, adherence, and biomarkers.</p><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:20px">`;
        ["Interaction check","Optimize timing","Should I cycle?","Cost optimization","What am I missing?","Stack for sleep"].forEach(q=>{html+=`<button onclick="setChatInput('${q.replace(/'/g,"\\'")}')" style="background:rgba(255,255,255,.03);border:1px solid var(--surface-border);border-radius:20px;color:rgba(255,255,255,.35);font-size:10px;padding:6px 14px;cursor:pointer;font-family:inherit">${q}</button>`;});
        html+=`</div></div>`;
      }
      state.chat.forEach((msg,idx)=>{
        if(msg.role==='user'){html+=`<div style="display:flex;justify-content:flex-end"><div class="chat-msg chat-user">${eH(msg.content)}</div></div>`;}
        else{html+=`<div style="display:flex;justify-content:flex-start"><div id="chat-msg-${idx}" class="chat-msg chat-ai">${fmtChat(msg.content)}${msg.streaming?'<span class="stream-cursor">▋</span>':''}</div></div>`;}
      });
      if(state.chatLoading&&!state.chat.some(m=>m.streaming)){html+=`<div style="display:flex;justify-content:flex-start"><div class="chat-ai" style="padding:12px 16px;border-radius:16px 16px 16px 4px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--purple);animation:dotPulse 1.2s 0s infinite;margin:0 2px"></span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--purple);animation:dotPulse 1.2s .2s infinite;margin:0 2px"></span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--purple);animation:dotPulse 1.2s .4s infinite;margin:0 2px"></span></div></div>`;}
      html+=`<div id="chatEnd"></div></div>`;
      html+=`<div style="display:flex;gap:8px;padding:12px 0 0;border-top:1px solid rgba(255,255,255,.04)"><input id="chatInput" class="input" value="${eA(state.chatInput)}" oninput="state.chatInput=this.value" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}" placeholder="Ask about your protocol..." style="flex:1"><button onclick="sendChat()" ${state.chatLoading||!state.chatInput.trim()?'disabled':''} style="padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:${state.chatInput.trim()?'pointer':'default'};transition:all .3s;background:${state.chatInput.trim()?'linear-gradient(135deg,var(--red),#bf3050)':'rgba(255,255,255,.03)'};color:${state.chatInput.trim()?'#fff':'rgba(255,255,255,.15)'};box-shadow:${state.chatInput.trim()?'0 4px 16px var(--red-glow)':'none'}">→</button></div></div>`;
    }

    // ── Insights sub-view ──
    if(state.subView==='insights'){
      html+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><div class="label" style="letter-spacing:2px">WEEKLY PERFORMANCE REPORT</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">AI analysis of your stack + biomarkers</div></div><button onclick="generateInsights()" ${state.insightsLoading?'disabled':''} style="padding:8px 16px;border-radius:10px;border:none;background:${state.insightsLoading?'rgba(255,255,255,.03)':'rgba(191,90,242,.15)'};color:${state.insightsLoading?'var(--text-muted)':'var(--purple)'};font-size:10px;font-weight:700;cursor:${state.insightsLoading?'default':'pointer'};font-family:IBM Plex Mono,monospace;border:1px solid ${state.insightsLoading?'transparent':'rgba(191,90,242,.25)'}">${state.insightsLoading?'GENERATING…':'GENERATE'}</button></div>`;
      if(state.insightsContent){
        html+=`<div class="glass insights-body" style="padding:20px">${fmtChat(state.insightsContent)}</div>`;
      } else if(!state.insightsLoading){
        html+=`<div style="text-align:center;padding:48px 20px"><div style="font-size:40px;margin-bottom:16px">✦</div><p style="color:var(--text-muted);font-size:13px;line-height:1.6">Generate a comprehensive weekly analysis of your supplement stack, adherence patterns, and biomarker trends.</p></div>`;
      }
      if(state.insightsLoading){html+=`<div class="glass" style="padding:20px;text-align:center"><div style="color:var(--text-muted);font-size:12px;margin-bottom:12px;font-family:IBM Plex Mono,monospace">ANALYZING YOUR PROTOCOL…</div><div id="insights-stream" class="insights-body" style="text-align:left"></div></div>`;}
      html+=`</div>`;
    }

    // ── Analyze sub-view ──
    if(state.subView==='analyze'){
      html+=`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div><div class="label" style="letter-spacing:2px">STACK ANALYZER</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">Interactions, redundancies & gaps</div></div><button onclick="analyzeStack()" ${state.analyzeLoading?'disabled':''} style="padding:8px 16px;border-radius:10px;border:none;background:${state.analyzeLoading?'rgba(255,255,255,.03)':'rgba(255,45,85,.12)'};color:${state.analyzeLoading?'var(--text-muted)':'var(--red)'};font-size:10px;font-weight:700;cursor:${state.analyzeLoading?'default':'pointer'};font-family:IBM Plex Mono,monospace;border:1px solid ${state.analyzeLoading?'transparent':'rgba(255,45,85,.2)'}">${state.analyzeLoading?'ANALYZING…':'RUN ANALYSIS'}</button></div>`;
      if(state.analyzeContent){
        html+=`<div class="glass insights-body" style="padding:20px">${fmtChat(state.analyzeContent)}</div>`;
      } else if(!state.analyzeLoading){
        html+=`<div style="text-align:center;padding:48px 20px"><div style="font-size:40px;margin-bottom:16px">⬡</div><p style="color:var(--text-muted);font-size:13px;line-height:1.6">Run a deep analysis of your stack to identify potential interactions, nutrient redundancies, gaps in coverage, and timing conflicts.</p></div>`;
      }
      if(state.analyzeLoading){html+=`<div class="glass" style="padding:20px;text-align:center"><div style="color:var(--text-muted);font-size:12px;margin-bottom:12px;font-family:IBM Plex Mono,monospace">RUNNING ANALYSIS…</div><div id="analyze-stream" class="insights-body" style="text-align:left"></div></div>`;}
      html+=`</div>`;
    }
  }

  // ═══ ADD/EDIT ═══
  if(state.showAdd){
    const f=state.form;
    html+=`</div>`; // close content before overlay
    html+=`<div class="overlay" onclick="if(event.target===this)closeAdd()"><div class="sheet"><div class="sheet-handle"></div><div class="label" style="margin-bottom:16px;letter-spacing:2px">${state.editId?'MODIFY COMPOUND':'ADD TO PROTOCOL'}</div><div style="display:flex;flex-direction:column;gap:14px">`;
    [{k:"name",l:"Compound Name",p:"e.g. Magnesium L-Threonate"},{k:"dose",l:"Dosage",p:"e.g. 200mg"},{k:"notes",l:"Notes",p:"Mechanism, sourcing, stacking notes..."}].forEach(fd=>{html+=`<div><label class="label" style="display:block;margin-bottom:6px;letter-spacing:1.5px">${fd.l}</label><input class="input" value="${eA(f[fd.k])}" oninput="state.form.${fd.k}=this.value" placeholder="${fd.p}"></div>`;});
    html+=`<div style="display:flex;gap:12px"><div style="flex:1"><label class="label" style="display:block;margin-bottom:6px">$/SERVING</label><input class="input" value="${eA(f.cost)}" oninput="state.form.cost=this.value" placeholder="0.25"></div><div style="flex:1"><label class="label" style="display:block;margin-bottom:6px">SERVINGS LEFT</label><input class="input" value="${eA(f.remaining)}" oninput="state.form.remaining=this.value" placeholder="60"></div></div>`;
    html+=`<div><label class="label" style="display:block;margin-bottom:6px">TIMING</label><div style="display:flex;flex-wrap:wrap;gap:6px">`;
    TIMINGS.forEach(t=>{const a=f.timing===t;html+=`<button class="pill ${a?'active':''}" onclick="state.form.timing='${t}';render()" style="${a?'background:rgba(255,45,85,.12);border-color:rgba(255,45,85,.3);color:var(--red)':''}">${t}</button>`;});
    html+=`</div></div><div><label class="label" style="display:block;margin-bottom:6px">CATEGORY</label><div style="display:flex;flex-wrap:wrap;gap:6px">`;
    CATEGORIES.filter(c=>c!=="All").forEach(cat=>{const c=CAT[cat],a=f.category===cat;html+=`<button class="pill ${a?'active':''}" onclick="state.form.category='${cat}';render()" style="${a?`background:${c.accent}15;border-color:${c.accent}44;color:${c.accent}`:''}">${cat}</button>`;});
    html+=`</div></div><div style="display:flex;align-items:center;gap:10px"><button class="toggle" onclick="state.form.fasted=!state.form.fasted;render()" style="background:${f.fasted?'var(--green)':'rgba(255,255,255,.1)'}"><div class="thumb" style="left:${f.fasted?'21px':'3px'}"></div></button><span class="mono" style="font-size:11px;color:var(--text-dim)">Fasting-safe</span></div>`;
    html+=`<div style="display:flex;gap:10px;margin-top:8px"><button class="btn-primary" onclick="addOrUpdate()" style="flex:1">${state.editId?'Update Compound':'Add to Protocol'}</button>${state.editId?`<button class="btn-danger" onclick="deleteSup()">Delete</button>`:''}</div>`;
    html+=`</div></div></div>`;
    app.innerHTML=html;
    return;
  }

  html+=`</div>`; // close content

  // SETTINGS MODAL
  if(state.showSettings){
    html+=`<div class="overlay" onclick="if(event.target===this)closeSettings()"><div class="sheet"><div class="sheet-handle"></div><div class="label" style="margin-bottom:20px;letter-spacing:2px">SETTINGS</div>`;
    html+=`<div class="settings-row"><div><div style="font-size:13px;font-weight:600;color:var(--text)">Export Data</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Download your full stack & history as JSON</div></div><button onclick="exportData()" style="padding:8px 16px;border-radius:9px;border:1px solid rgba(50,215,75,.2);background:rgba(50,215,75,.1);color:var(--green);font-size:10px;font-weight:700;cursor:pointer;font-family:IBM Plex Mono,monospace">EXPORT</button></div>`;
    html+=`<div class="settings-row"><div><div style="font-size:13px;font-weight:600;color:var(--text)">Notifications</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Dosing reminders via browser notifications</div></div><button onclick="requestNotifications()" style="padding:8px 16px;border-radius:9px;border:1px solid rgba(110,110,255,.2);background:rgba(110,110,255,.1);color:var(--blue);font-size:10px;font-weight:700;cursor:pointer;font-family:IBM Plex Mono,monospace">${Notification.permission==='granted'?'ENABLED ✓':'ENABLE'}</button></div>`;
    html+=`<div class="settings-row"><div><div style="font-size:13px;font-weight:600;color:var(--text)">Profile</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Logged in as ${eH(state.profile?.name||'User')}</div></div></div>`;
    html+=`<div class="settings-row"><div><div style="font-size:13px;font-weight:600;color:var(--red)">Reset Profile</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">Erase all data and start over</div></div><button onclick="resetProfile()" style="padding:8px 16px;border-radius:9px;border:1px solid rgba(255,45,85,.2);background:rgba(255,45,85,.08);color:var(--red);font-size:10px;font-weight:700;cursor:pointer;font-family:IBM Plex Mono,monospace">RESET</button></div>`;
    html+=`<button onclick="closeSettings()" style="width:100%;margin-top:20px;padding:14px;border-radius:12px;border:1px solid var(--surface-border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer">Close</button>`;
    html+=`</div></div>`;
  }

  // BIO MODAL
  if(state.showBioModal){
    html+=`<div class="overlay" onclick="if(event.target===this)closeBioModal()"><div class="sheet"><div class="sheet-handle"></div><div class="label" style="margin-bottom:20px;letter-spacing:2px">LOG BIOMARKERS — ${td}</div>`;
    BIOS.forEach(b=>{html+=`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12px;color:${b.color};font-weight:600">${b.icon} ${b.label}</span><span id="bv_${b.key}" class="mono" style="font-size:18px;font-weight:800;color:${b.color}">${state.bioEntry[b.key]}</span></div><input type="range" min="1" max="10" value="${state.bioEntry[b.key]}" oninput="state.bioEntry.${b.key}=+this.value;document.getElementById('bv_${b.key}').textContent=this.value" style="accent-color:${b.color}"></div>`;});
    html+=`<div style="display:flex;gap:10px;margin-top:8px"><button class="btn-primary" onclick="saveBio()" style="flex:1">Save</button><button class="btn-ghost" onclick="closeBioModal()">Cancel</button></div></div></div>`;
  }

  app.innerHTML=html;

  // Post-render
  if(state.view==='chat'&&state.subView==='chat'){const el=document.getElementById('chatEnd');if(el)el.scrollIntoView({behavior:'smooth'});}
}

// ── Actions ──────────────────────────────────────────────
function escapeHtml(s){return eH(s);}
window.goToTemplates=function(){if(!state.onboardName.trim())return;state.onboardStep="template";render();};
window.selectTemplate=function(key){state.selectedTemplate=key;render();};
window.completeOnboarding=function(){
  if(!state.selectedTemplate)return;
  const tmpl=TEMPLATES[state.selectedTemplate];
  const profile={name:state.onboardName.trim(),createdAt:new Date().toISOString(),template:state.selectedTemplate};
  state.profile=profile;state.onboarded=true;
  state.supplements=tmpl.supplements.map(s=>({...s,id:Date.now().toString()+Math.random().toString(36).slice(2,6)}));
  state.log={};state.chat={};state.bio={};
  saveJSON("p-profile",profile);persist();render();
};
window.resetProfile=function(){
  if(!confirm("This will erase all your data. Continue?"))return;
  ['p-profile','p-supps','p-log','p-chat','p-bio','p-journal','p-insights'].forEach(k=>localStorage.removeItem(k));
  Object.assign(state,{onboarded:false,profile:null,onboardStep:"name",onboardName:"",selectedTemplate:null,supplements:[],log:{},chat:[],bio:{},journal:{},view:"command",subView:"chat"});
  closeSettings();render();
};
window.nav=function(v){state.view=v;state.showAdd=false;render();};
window.setFilter=function(f){state.filter=f;render();};
window.toggleTaken=toggleTaken;
window.openAdd=function(){state.showAdd=true;state.editId=null;state.form={name:'',dose:'',timing:'Morning',category:'Performance',notes:'',cost:'',remaining:'',fasted:true};render();};
window.closeAdd=function(){state.showAdd=false;render();};
window.startEdit=function(id){const s=state.supplements.find(x=>x.id===id);if(!s)return;state.form={name:s.name,dose:s.dose,timing:s.timing,category:s.category,notes:s.notes,cost:s.cost?.toString()||'',remaining:s.remaining?.toString()||'',fasted:s.fasted!==false};state.editId=id;state.showAdd=true;render();};
window.addOrUpdate=function(){
  const f=state.form;if(!f.name||!f.dose)return;
  const entry={...f,cost:parseFloat(f.cost)||0,remaining:parseInt(f.remaining)||0};
  if(state.editId){state.supplements=state.supplements.map(s=>s.id===state.editId?{...s,...entry}:s);state.editId=null;}
  else{state.supplements.push({...entry,id:Date.now().toString(),active:true});}
  state.form={name:'',dose:'',timing:'Morning',category:'Performance',notes:'',cost:'',remaining:'',fasted:true};
  state.showAdd=false;state.view='stack';persist();render();toast('Stack updated','success');
};
window.deleteSup=function(){
  if(!state.editId)return;
  state.supplements=state.supplements.filter(s=>s.id!==state.editId);
  state.editId=null;state.showAdd=false;state.view='stack';persist();render();toast('Removed from stack','info');
};
window.setChatInput=function(q){state.chatInput=q;render();const el=document.getElementById('chatInput');if(el)el.focus();};
window.clearChat=function(){state.chat=[];persist();render();};
window.openBioModal=function(){state.showBioModal=true;render();};
window.closeBioModal=function(){state.showBioModal=false;render();};
window.saveBio=function(){state.bio[todayStr()]={...state.bioEntry};state.showBioModal=false;persist();render();toast('Biomarkers logged','success');};
window.openSettings=function(){state.showSettings=true;render();};
window.closeSettings=function(){state.showSettings=false;render();};
window.saveJournal=function(){
  const val=state.journalInput.trim()||document.getElementById('journalInput')?.value.trim();
  if(!val)return;state.journal[todayStr()]=val;state.journalInput='';persist();render();toast('Journal saved','success');
};
window.requestNotifications=function(){
  if(!('Notification' in window)){toast('Notifications not supported','error');return;}
  Notification.requestPermission().then(p=>{p==='granted'?toast('Notifications enabled','success'):toast('Permission denied','error');render();});
};

// ── Streaming Chat ───────────────────────────────────────
window.sendChat=async function(){
  if(!state.chatInput.trim()||state.chatLoading)return;
  const msg=state.chatInput.trim();
  state.chat.push({role:'user',content:msg});
  state.chatInput='';state.chatLoading=true;
  persist();render();
  const sys=buildCtx();
  const history=state.chat.slice(-12).map(m=>({role:m.role,content:m.content}));
  // Add streaming placeholder
  state.chat.push({role:'assistant',content:'',streaming:true});
  const msgIdx=state.chat.length-1;
  render();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sys,messages:history,stream:true})});
    if(!res.ok)throw new Error('API error');
    await streamSSE(res,
      text=>{
        state.chat[msgIdx].content=text;
        const el=document.getElementById(`chat-msg-${msgIdx}`);
        if(el)el.innerHTML=fmtChat(text)+'<span class="stream-cursor">▋</span>';
        const end=document.getElementById('chatEnd');if(end)end.scrollIntoView({behavior:'smooth'});
      },
      text=>{state.chat[msgIdx]={role:'assistant',content:text||'No response.',streaming:false};}
    );
  }catch(e){state.chat[msgIdx]={role:'assistant',content:'Connection error. Check your network and try again.',streaming:false};}
  state.chatLoading=false;persist();render();
};

// ── Generate Insights ────────────────────────────────────
window.generateInsights=async function(){
  state.insightsLoading=true;state.insightsContent='';render();
  const sys=buildCtx();
  const prompt=`Generate a comprehensive weekly performance report for ${state.profile?.name||'the user'}.

Format with these exact sections using ## headers:
## Performance Summary
## Stack Analysis
## What's Working
## Optimization Opportunities
## This Week's Focus

Reference specific compounds by name. Be evidence-based and actionable. Keep each section concise but substantive.`;
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sys,messages:[{role:'user',content:prompt}],stream:true,max_tokens:2000})});
    if(!res.ok)throw new Error('API error');
    await streamSSE(res,
      text=>{const el=document.getElementById('insights-stream');if(el)el.innerHTML=fmtChat(text)+'<span class="stream-cursor">▋</span>';},
      text=>{state.insightsContent=text||'Failed to generate insights.';}
    );
  }catch(e){state.insightsContent='Connection error. Try again.';}
  state.insightsLoading=false;persist();render();
};

// ── Analyze Stack ────────────────────────────────────────
window.analyzeStack=async function(){
  state.analyzeLoading=true;state.analyzeContent='';render();
  const sys=buildCtx();
  const prompt=`Perform a detailed analysis of this supplement stack. Use ## headers for:
## Potential Interactions
## Redundancies & Overlaps
## Coverage Gaps
## Timing Conflicts
## Priority Recommendations

For each interaction or issue, cite the mechanism. Be direct — prioritize the highest-impact findings.`;
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sys,messages:[{role:'user',content:prompt}],stream:true,max_tokens:2000})});
    if(!res.ok)throw new Error('API error');
    await streamSSE(res,
      text=>{const el=document.getElementById('analyze-stream');if(el)el.innerHTML=fmtChat(text)+'<span class="stream-cursor">▋</span>';},
      text=>{state.analyzeContent=text||'Failed to run analysis.';}
    );
  }catch(e){state.analyzeContent='Connection error. Try again.';}
  state.analyzeLoading=false;render();
};

// ── Swipe Gestures ───────────────────────────────────────
function initSwipe(){
  let sx=0,sy=0;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(state.showBioModal||state.showSettings||state.showAdd)return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.8)return;
    const idx=VIEWS.indexOf(state.view);if(idx===-1)return;
    if(dx<0&&idx<VIEWS.length-1){state.view=VIEWS[idx+1];render();}
    else if(dx>0&&idx>0){state.view=VIEWS[idx-1];render();}
  },{passive:true});
}

// ── PWA Install ──────────────────────────────────────────
let _pwaPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_pwaPrompt=e;document.getElementById('pwa-banner').style.display='flex';});
window.installPWA=function(){if(!_pwaPrompt)return;_pwaPrompt.prompt();_pwaPrompt.userChoice.then(r=>{if(r.outcome==='accepted')toast('PROTOCOL installed!','success');_pwaPrompt=null;document.getElementById('pwa-banner').style.display='none';});};

// ── Boot ─────────────────────────────────────────────────
render();
initParticles();
initSwipe();
setInterval(()=>{const el=document.getElementById('live-clock');if(el)el.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});},1000);
</script>
